<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0f0d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ascend" />
<meta name="description" content="Ascend — tus finanzas personales como un juego. Gastos, ahorros, suscripciones y deudas, sin estrés." />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<title>Ascend — Tus finanzas, sin estrés</title>

<!-- Fuente: Poppins (Sans-Serif Premium) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    /* Neutrales base premium (tonos oscuros ultra-profundos) */
    --bg-0: #040608;
    --bg-1: #090e14;
    --bg-2: #101622;
    --bg-3: #162030;
    --text-0: #ffffff;
    --text-1: #94a3b8;
    --text-2: #64748b;
    --danger: #ff4d6d;
    --warn: #ffb703;

    /* Bordes y glows derivados del acento */
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.16);
    --glow: rgba(var(--mint-rgb), 0.25);
  }

  /* ── Temas de Acento con Gradientes y Brillo Fintech ── */
  [data-accent="mint"],
  :root {
    --mint: #10b981;  --mint-soft: #34d399;  --mint-deep: #059669;
    --mint-rgb: 16, 185, 129;  --mint-deep-rgb: 5, 150, 105;
    --accent-ink: #040f0b;
    --accent-gradient: linear-gradient(135deg, #10b981, #06b6d4);
  }
  [data-accent="violet"] {
    --mint: #8b5cf6;  --mint-soft: #a78bfa;  --mint-deep: #7c3aed;
    --mint-rgb: 139, 92, 246;  --mint-deep-rgb: 124, 58, 237;
    --accent-ink: #090414;
    --accent-gradient: linear-gradient(135deg, #8b5cf6, #d946ef);
  }
  [data-accent="coral"] {
    --mint: #f43f5e;  --mint-soft: #fb7185;  --mint-deep: #e11d48;
    --mint-rgb: 244, 63, 94;  --mint-deep-rgb: 225, 29, 72;
    --accent-ink: #140206;
    --accent-gradient: linear-gradient(135deg, #f43f5e, #fb923c);
  }
  [data-accent="amber"] {
    --mint: #f59e0b;  --mint-soft: #fbbf24;  --mint-deep: #d97706;
    --mint-rgb: 245, 158, 11;  --mint-deep-rgb: 217, 119, 6;
    --accent-ink: #140c02;
    --accent-gradient: linear-gradient(135deg, #f59e0b, #facc15);
  }
  [data-accent="ocean"] {
    --mint: #3b82f6;  --mint-soft: #60a5fa;  --mint-deep: #2563eb;
    --mint-rgb: 59, 130, 246;  --mint-deep-rgb: 37, 99, 235;
    --accent-ink: #020714;
    --accent-gradient: linear-gradient(135deg, #3b82f6, #60a5fa);
  }

  * { 
    -webkit-tap-highlight-color: transparent; 
    box-sizing: border-box;
  }

  html, body, #root {
    background: var(--bg-0);
    color: var(--text-0);
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .font-display { 
    font-family: 'Poppins', sans-serif; 
    font-weight: 600; 
    letter-spacing: -0.02em; 
  }
  
  .font-serif-accent { 
    font-family: 'Poppins', sans-serif; 
    font-weight: 600;
    font-style: italic; 
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Fondo dinámico con malla e iluminación ambiental */
  .bg-mesh {
    background:
      radial-gradient(ellipse 70% 50% at 20% -10%, rgba(var(--mint-rgb), 0.12), transparent 50%),
      radial-gradient(ellipse 60% 45% at 90% 10%, rgba(var(--mint-deep-rgb), 0.08), transparent 55%),
      radial-gradient(circle at 50% 50%, rgba(16, 22, 35, 0.5), var(--bg-0));
    background-attachment: fixed;
  }

  /* Auroras en segundo plano */
  .aurora {
    position: fixed; inset: -10% -10% auto -10%; height: 50vh;
    pointer-events: none; z-index: 0; opacity: 0.6;
    background:
      radial-gradient(ellipse 40% 50% at 30% 20%, rgba(var(--mint-rgb), 0.14), transparent 60%),
      radial-gradient(ellipse 40% 40% at 70% 15%, rgba(var(--mint-deep-rgb), 0.10), transparent 60%);
    filter: blur(60px);
    animation: aurora-drift 20s ease-in-out infinite alternate;
  }
  @keyframes aurora-drift {
    0%   { transform: translate3d(-3%, -2%, 0) scale(1); }
    50%  { transform: translate3d(4%, 2%, 0) scale(1.1); }
    100% { transform: translate3d(-2%, 3%, 0) scale(1.03); }
  }

  /* ── Estructura Bento Glassmorphism ── */
  .bento {
    background: rgba(16, 24, 38, 0.4);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 28px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .bento::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    padding: 1px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0) 40%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .bento-hero {
    background:
      radial-gradient(circle at 10% 10%, rgba(var(--mint-rgb), 0.16), transparent 50%),
      radial-gradient(circle at 95% 95%, rgba(var(--mint-deep-rgb), 0.08), transparent 50%),
      rgba(15, 23, 42, 0.45);
    backdrop-filter: blur(28px) saturate(190%);
    -webkit-backdrop-filter: blur(28px) saturate(190%);
    border: 1px solid rgba(var(--mint-rgb), 0.18);
    border-radius: 32px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 45px -15px rgba(0, 0, 0, 0.5), 0 0 30px -5px rgba(var(--mint-rgb), 0.1);
  }

  /* Grano estético */
  .grain::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4'/></svg>");
    opacity: 0.03;
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  .glow-mint { 
    box-shadow: 0 0 0 1px rgba(var(--mint-rgb), 0.15), 0 8px 32px -6px rgba(var(--mint-rgb), 0.25); 
  }

  /* Botones Premium */
  .btn-mint {
    background: var(--accent-gradient);
    color: var(--accent-ink);
    font-weight: 600;
    border: none;
    box-shadow: 0 4px 18px -4px rgba(var(--mint-rgb), 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease, opacity 0.2s ease;
  }
  .btn-mint:active { 
    transform: scale(0.96); 
    box-shadow: 0 2px 8px -2px rgba(var(--mint-rgb), 0.2);
  }

  /* Inputs Glassmorphism */
  input, select, textarea {
    background: rgba(15, 23, 42, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    color: var(--text-0);
    border-radius: 16px;
    padding: 14px 18px;
    width: 100%;
    font-family: 'Poppins', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    background: rgba(22, 32, 54, 0.6);
    border-color: var(--mint);
    box-shadow: 0 0 0 4px rgba(var(--mint-rgb), 0.12);
  }

  /* Animaciones avanzadas */
  @keyframes float-in {
    0% { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes pulse-mint {
    0%, 100% { box-shadow: 0 0 0 0 rgba(var(--mint-rgb), 0.4); }
    50% { box-shadow: 0 0 0 10px rgba(var(--mint-rgb), 0); }
  }
  @keyframes float-soft {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  @keyframes spring-in {
    0%   { opacity: 0; transform: translateY(20px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .anim-in { animation: float-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  .anim-pop { animation: pop 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  .anim-spring { animation: spring-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .anim-pulse { animation: pulse-mint 2.2s infinite; }
  .anim-float { animation: float-soft 4s ease-in-out infinite; }

  /* Entrada escalonada */
  .stagger > * { animation: spring-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .stagger > *:nth-child(1) { animation-delay: .02s; }
  .stagger > *:nth-child(2) { animation-delay: .06s; }
  .stagger > *:nth-child(3) { animation-delay: .10s; }
  .stagger > *:nth-child(4) { animation-delay: .14s; }
  .stagger > *:nth-child(5) { animation-delay: .18s; }
  .stagger > *:nth-child(6) { animation-delay: .22s; }
  .stagger > *:nth-child(7) { animation-delay: .26s; }
  .stagger > *:nth-child(8) { animation-delay: .30s; }

  .shimmer {
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    background-size: 200% 100%;
    animation: shimmer 3s infinite;
  }

  .press { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.2s; }
  .press:active { transform: scale(0.96); }

  /* Accesibilidad */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .aurora { animation: none; }
  }

  .confetti {
    position: fixed; top: 0; width: 8px; height: 14px;
    pointer-events: none; z-index: 9999;
    animation: confetti-fall 1.8s ease-out forwards;
  }

  /* ── Navegación Inferior Flotante Premium ── */
  .navbar {
    position: fixed;
    bottom: 24px;
    left: 20px;
    right: 20px;
    background: rgba(13, 20, 32, 0.65);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    z-index: 50;
    max-width: 440px;
    margin: 0 auto;
  }

  /* Scroll snap pages */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* Safe area */
  .safe-top { padding-top: env(safe-area-inset-top); }
  .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

  ::selection { background: var(--mint); color: var(--accent-ink); }

  /* Anillos de Progreso */
  .ring-track { stroke: rgba(255, 255, 255, 0.05); }
  .ring-fill { 
    stroke: var(--mint); 
    transition: stroke-dashoffset .8s cubic-bezier(0.16, 1, 0.3, 1); 
    filter: drop-shadow(0 0 6px rgba(var(--mint-rgb), 0.5)); 
  }

  /* Chips */
  .chip {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-1);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .chip:active { transform: scale(0.95); }
  .chip.active {
    background: rgba(var(--mint-rgb), 0.12);
    border-color: rgba(var(--mint-rgb), 0.3);
    color: var(--mint);
    box-shadow: 0 0 15px -3px rgba(var(--mint-rgb), 0.15);
  }

  /* ── Modales / Hojas Deslizantes (Sheets) ── */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(12px);
    z-index: 100;
    animation: float-in .25s ease-out;
  }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(16, 24, 38, 0.8), rgba(9, 14, 22, 0.9));
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border-top-left-radius: 36px;
    border-top-right-radius: 36px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 101;
    padding: 8px 22px 32px;
    padding-bottom: calc(32px + env(safe-area-inset-bottom));
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.6);
    animation: sheet-up .4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes sheet-up {
    0% { transform: translateY(100%); }
    100% { transform: translateY(0); }
  }
  .sheet-handle {
    width: 44px; height: 5px; border-radius: 99px;
    background: rgba(255, 255, 255, 0.12);
    margin: 8px auto 20px;
  }

  .cat-icon { 
    width: 44px; height: 44px; 
    border-radius: 14px; 
    display: flex; align-items: center; justify-content: center; 
    font-size: 20px; flex-shrink: 0; 
  }
</style>
</head>
<body class="bg-mesh">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ============================================================
   STORAGE — persistencia local (localStorage)
   ============================================================ */
const STORAGE_KEY = 'ascend_v1';
const STORAGE_KEY_LEGACY = 'mint_app_v1';
// Migración silenciosa: si existen datos del nombre antiguo y no del nuevo, los copiamos.
try {
  if (typeof localStorage !== 'undefined' && !localStorage.getItem(STORAGE_KEY)) {
    const legacy = localStorage.getItem(STORAGE_KEY_LEGACY);
    if (legacy) localStorage.setItem(STORAGE_KEY, legacy);
  }
} catch {}

const defaultState = {
  user: { name: 'Sergio', xp: 0, level: 1, streak: 0, lastActiveDate: null, achievements: [] },
  accent: 'mint',
  balance: 1850.00,
  monthlyIncome: 2400,
  expenses: [
    { id: 1, amount: 12.50, category: 'food', name: 'Café y bocadillo', date: new Date(Date.now() - 86400000).toISOString() },
    { id: 2, amount: 45.00, category: 'transport', name: 'Gasolina furgo', date: new Date(Date.now() - 86400000 * 2).toISOString() },
    { id: 3, amount: 8.99, category: 'entertainment', name: 'Cine', date: new Date(Date.now() - 86400000 * 3).toISOString() },
  ],
  subscriptions: [
    { id: 1, name: 'Netflix', amount: 13.99, renewDay: 15, icon: '🎬', color: '#E50914' },
    { id: 2, name: 'Spotify', amount: 9.99, renewDay: 22, icon: '🎵', color: '#1DB954' },
    { id: 3, name: 'iCloud+', amount: 2.99, renewDay: 5, icon: '☁️', color: '#007AFF' },
  ],
  goals: [
    { id: 1, name: 'Vacaciones Donostia', target: 1200, current: 450, icon: '🏖️', deadline: '2026-08-01' },
    { id: 2, name: 'Fondo de emergencia', target: 3000, current: 1800, icon: '🛡️', deadline: '2026-12-31' },
  ],
  debts: [
    { id: 1, person: 'Carlos', amount: 50, direction: 'owed_to_me', note: 'Cena pizza', date: new Date(Date.now() - 86400000 * 5).toISOString() },
    { id: 2, person: 'Ana', amount: 25, direction: 'i_owe', note: 'Entradas concierto', date: new Date(Date.now() - 86400000 * 10).toISOString() },
  ],
};

/* Banderas para avisar al usuario tras montar (en window para sobrevivir Babel) */
const STORAGE_BAK = STORAGE_KEY + '_corrupt_backup';
window.__ascendWarnings = window.__ascendWarnings || { load: null, save: null };

const loadState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') throw new Error('shape');
    return { ...defaultState, ...parsed };
  } catch (e) {
    // Backup del raw corrupto para recuperación manual
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) localStorage.setItem(STORAGE_BAK, raw);
    } catch {}
    window.__ascendWarnings.load = 'Datos previos corruptos. Empezamos desde cero (backup guardado).';
    return defaultState;
  }
};
const saveState = (s) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
  catch (e) { window.__ascendWarnings.save = 'No se pudo guardar (almacenamiento lleno o bloqueado).'; }
};

/* ============================================================
   CATEGORÍAS
   ============================================================ */
const CATEGORIES = {
  food:          { name: 'Comida',       icon: '🍔', color: '#FF9F43' },
  transport:     { name: 'Transporte',   icon: '🚗', color: '#54A0FF' },
  entertainment: { name: 'Ocio',         icon: '🎮', color: '#A55EEA' },
  shopping:      { name: 'Compras',      icon: '🛍️', color: '#FF6B9D' },
  bills:         { name: 'Facturas',     icon: '📄', color: '#FFD166' },
  health:        { name: 'Salud',        icon: '💊', color: '#26DE81' },
  home:          { name: 'Hogar',        icon: '🏠', color: '#8B7FD9' },
  other:         { name: 'Otros',        icon: '✨', color: '#6B7D75' },
};

/* ============================================================
   HELPERS
   ============================================================ */
const formatMoney = (n, opts = {}) => {
  const { showSign = false } = opts;
  const sign = showSign && n > 0 ? '+' : '';
  return sign + new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2 }).format(n);
};
const today = () => new Date().toISOString().split('T')[0];
const isSameMonth = (dateStr) => {
  const d = new Date(dateStr); const n = new Date();
  return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth();
};
const xpToNextLevel = (level) => 100 + (level - 1) * 50;

/* IDs únicos a prueba de doble-click en mismo ms */
const newId = () => {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
};

/* Parser tolerante: acepta coma o punto, espacios y símbolos */
const parseAmount = (v) => {
  if (v == null) return NaN;
  const s = String(v).replace(/[€\s]/g, '').replace(',', '.');
  const n = parseFloat(s);
  return Number.isFinite(n) ? n : NaN;
};

const clamp = (n, min, max) => Math.min(Math.max(n, min), max);

const prefersReducedMotion = () =>
  typeof window !== 'undefined' &&
  window.matchMedia &&
  window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ============================================================
   TEMAS DE ACENTO — el menta es el original
   ============================================================ */
const ACCENTS = [
  { id: 'mint',   name: 'Menta',   c: '#10b981', deep: '#06b6d4' },
  { id: 'violet', name: 'Violeta', c: '#8b5cf6', deep: '#d946ef' },
  { id: 'coral',  name: 'Coral',   c: '#f43f5e', deep: '#fb923c' },
  { id: 'amber',  name: 'Ámbar',   c: '#f59e0b', deep: '#facc15' },
  { id: 'ocean',  name: 'Océano',  c: '#3b82f6', deep: '#60a5fa' },
];

/* ============================================================
   ANIMATED NUMBER — cuenta suave hacia el valor
   ============================================================ */
const AnimatedNumber = ({ value, format = (v) => formatMoney(v), duration = 800 }) => {
  const safe = Number.isFinite(value) ? value : 0;
  const [display, setDisplay] = useState(safe);
  const displayRef = useRef(safe);
  useEffect(() => {
    if (prefersReducedMotion()) {
      setDisplay(safe); displayRef.current = safe; return;
    }
    // Empezar SIEMPRE desde el valor visible actual — evita saltos si el
    // value cambia antes de terminar la animación previa.
    const start = displayRef.current;
    const end = safe;
    if (start === end) return;
    const t0 = performance.now();
    let raf;
    const tick = (t) => {
      const p = Math.min((t - t0) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const cur = start + (end - start) * eased;
      displayRef.current = cur;
      setDisplay(cur);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [safe]);
  return <>{format(display)}</>;
};

   CONFETTI
   ============================================================ */
const fireConfetti = () => {
  const colors = ['#10b981', '#34d399', '#06b6d4', '#8b5cf6', '#f43f5e', '#f59e0b'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 0.3 + 's';
    el.style.transform = `rotate(${Math.random() * 360}deg)`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
};

/* ============================================================
   useGuard — bloquea reentrada en handlers (anti doble-click)
   ============================================================ */
const useGuard = () => {
  const lockRef = useRef(false);
  return (fn) => (...args) => {
    if (lockRef.current) return;
    lockRef.current = true;
    try { fn(...args); }
    finally { setTimeout(() => { lockRef.current = false; }, 600); }
  };
};

/* ============================================================
   APP ROOT
   ============================================================ */
function App() {
  const [state, setState] = useState(loadState);
  const [page, setPage] = useState('home');
  const [sheet, setSheet] = useState(null); // 'addExpense' | 'addSub' | 'addGoal' | 'addDebt' | 'achievement'
  const [toast, setToast] = useState(null);

  // Auto-save y aviso si el almacenamiento falla
  useEffect(() => {
    saveState(state);
    const w = window.__ascendWarnings;
    if (w && w.save) {
      const msg = w.save; w.save = null;
      setToast({ msg, type: 'success' });
      setTimeout(() => setToast(null), 3500);
    }
  }, [state]);

  // Aviso de carga corrupta — banner persistente que el usuario descarta a mano
  const [loadBanner, setLoadBanner] = useState(() => window.__ascendWarnings?.load || null);
  useEffect(() => { if (window.__ascendWarnings) window.__ascendWarnings.load = null; }, []);

  // Streak diaria — check on mount
  useEffect(() => {
    const t = today();
    if (state.user.lastActiveDate !== t) {
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      const newStreak = state.user.lastActiveDate === yesterday ? state.user.streak + 1 : 1;
      setState(s => ({ ...s, user: { ...s.user, lastActiveDate: t, streak: newStreak } }));
    }
  }, []);

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2400);
  };

  const addXP = (amount, reason) => {
    // Calculamos fuera del reducer para evitar side-effects dentro de setState
    let leveledUp = false;
    let newLevel = state.user.level;
    setState(s => {
      let xp = s.user.xp + amount;
      let level = s.user.level;
      while (xp >= xpToNextLevel(level)) {
        xp -= xpToNextLevel(level);
        level++;
        leveledUp = true;
      }
      newLevel = level;
      return { ...s, user: { ...s.user, xp, level } };
    });
    if (leveledUp) {
      setTimeout(() => { fireConfetti(); showToast(`¡Nivel ${newLevel} desbloqueado! 🎉`, 'success'); }, 200);
    } else {
      showToast(`+${amount} XP · ${reason}`, 'xp');
    }
  };

  /* ---------- Mutaciones (todas guard-protegidas via useGuard) ---------- */
  const guard = useGuard();

  const addExpense = guard((data) => {
    const amount = Number.isFinite(data.amount) && data.amount > 0 ? data.amount : 0;
    if (!amount || !data.name || !data.name.trim()) return;
    const exp = { id: newId(), ...data, amount, name: data.name.trim(), date: new Date().toISOString() };
    setState(s => ({ ...s, expenses: [exp, ...s.expenses], balance: s.balance - amount }));
    addXP(5, 'gasto registrado');
    setSheet(null);
  });
  const addSubscription = guard((data) => {
    const amount = Number.isFinite(data.amount) && data.amount > 0 ? data.amount : 0;
    const renewDay = clamp(parseInt(data.renewDay) || 1, 1, 31);
    if (!amount || !data.name || !data.name.trim()) return;
    setState(s => ({ ...s, subscriptions: [...s.subscriptions, { id: newId(), ...data, amount, renewDay, name: data.name.trim() }] }));
    addXP(10, 'suscripción añadida');
    setSheet(null);
  });
  const removeSubscription = guard((id) => {
    setState(s => ({ ...s, subscriptions: s.subscriptions.filter(x => x.id !== id) }));
    showToast('Suscripción cancelada · ahorras dinero 💚', 'success');
    addXP(15, '¡has ahorrado!');
  });
  const updateSubscription = guard((id, data) => {
    const amount = Number.isFinite(data.amount) && data.amount > 0 ? data.amount : null;
    const renewDay = clamp(parseInt(data.renewDay) || 1, 1, 31);
    if (amount == null || !data.name || !data.name.trim()) return;
    setState(s => ({
      ...s,
      subscriptions: s.subscriptions.map(x => x.id === id ? { ...x, ...data, amount, renewDay, name: data.name.trim() } : x),
    }));
    showToast('Suscripción actualizada ✓', 'success');
    setSheet(null);
  });
  const addGoal = guard((data) => {
    const target = Number.isFinite(data.target) && data.target > 0 ? data.target : 0;
    if (!target || !data.name || !data.name.trim()) return;
    setState(s => ({ ...s, goals: [...s.goals, { id: newId(), current: 0, ...data, target, name: data.name.trim() }] }));
    addXP(20, 'nuevo objetivo');
    setSheet(null);
  });
  const addToGoal = guard((goalId, amount) => {
    if (!Number.isFinite(amount) || amount <= 0) return;
    setState(s => {
      const g = s.goals.find(x => x.id === goalId);
      if (!g) return s;
      // Sólo aceptamos el resto que falta para el target — el balance baja
      // exactamente lo aportado, ni un céntimo desaparece.
      const room = Math.max(g.target - g.current, 0);
      const actual = Math.min(amount, room);
      if (actual <= 0) return s;
      return {
        ...s,
        goals: s.goals.map(x => x.id === goalId ? { ...x, current: x.current + actual } : x),
        balance: s.balance - actual,
      };
    });
    fireConfetti();
    addXP(15, '¡un paso más cerca!');
  });
  const addDebt = guard((data) => {
    const amount = Number.isFinite(data.amount) && data.amount > 0 ? data.amount : 0;
    if (!amount || !data.person || !data.person.trim()) return;
    setState(s => ({ ...s, debts: [...s.debts, { id: newId(), date: new Date().toISOString(), ...data, amount, person: data.person.trim() }] }));
    addXP(5, 'deuda registrada');
    setSheet(null);
  });
  const settleDebt = guard((id) => {
    setState(s => {
      if (!s.debts.some(d => d.id === id)) return s;
      return { ...s, debts: s.debts.filter(d => d.id !== id) };
    });
    showToast('Deuda saldada ✓', 'success');
    addXP(10, 'cuenta limpia');
  });
  const setAccent = (accent) => setState(s => ({ ...s, accent }));
  const saveConfig = guard(({ name, balance, monthlyIncome }) => {
    setState(s => ({
      ...s,
      balance: Number.isFinite(balance) ? balance : s.balance,
      monthlyIncome: Number.isFinite(monthlyIncome) && monthlyIncome >= 0 ? monthlyIncome : s.monthlyIncome,
      user: { ...s.user, name: (name && name.trim()) ? name.trim() : s.user.name },
    }));
    showToast('Ajustes guardados ✓', 'success');
    setSheet(null);
  });

  const ctx = {
    state, setState, page, setPage, sheet, setSheet,
    addExpense, addSubscription, removeSubscription, updateSubscription, addGoal, addToGoal, addDebt, settleDebt,
    showToast, addXP, setAccent, saveConfig,
  };

  return (
    <div data-accent={state.accent || 'mint'} className="relative min-h-screen pb-24 safe-top">
      <div className="aurora" aria-hidden="true" />
      <div className="relative" style={{ zIndex: 1 }}>
      {loadBanner && (
        <div className="mx-5 mt-3 mb-2 rounded-2xl border border-[var(--warn)] bg-[rgba(255,209,102,0.08)] px-4 py-3 flex items-start gap-3 anim-spring">
          <span className="text-lg leading-none mt-0.5" aria-hidden="true">⚠️</span>
          <div className="flex-1 text-xs text-[var(--text-1)] leading-snug">{loadBanner}</div>
          <button onClick={() => setLoadBanner(null)} aria-label="Cerrar aviso" className="press text-[var(--text-2)] text-lg leading-none">×</button>
        </div>
      )}
      {page === 'home'          && <HomePage  ctx={ctx} />}
      {page === 'expenses'      && <ExpensesPage ctx={ctx} />}
      {page === 'subs'          && <SubsPage ctx={ctx} />}
      {page === 'goals'         && <GoalsPage ctx={ctx} />}
      {page === 'debts'         && <DebtsPage ctx={ctx} />}
      {page === 'calc'          && <CalcPage ctx={ctx} />}
      {page === 'profile'       && <ProfilePage ctx={ctx} />}

      <BottomNav page={page} setPage={setPage} setSheet={setSheet} />

      {sheet === 'settings'  && <SettingsSheet ctx={ctx} onClose={() => setSheet(null)} />}
      {sheet === 'addExpense' && <AddExpenseSheet onClose={() => setSheet(null)} onSave={addExpense} />}
      {sheet === 'addSub'     && <AddSubSheet onClose={() => setSheet(null)} onSave={addSubscription} />}
      {sheet?.startsWith && sheet.startsWith('editSub:') && (() => {
        const id = sheet.split(':').slice(1).join(':');
        const sub = state.subscriptions.find(s => String(s.id) === id);
        if (!sub) return null;
        return (
          <AddSubSheet
            initial={sub}
            onClose={() => setSheet(null)}
            onSave={(data) => updateSubscription(sub.id, data)}
            onDelete={() => { removeSubscription(sub.id); setSheet(null); }}
          />
        );
      })()}
      {sheet === 'addGoal'    && <AddGoalSheet onClose={() => setSheet(null)} onSave={addGoal} />}
      {sheet === 'addDebt'    && <AddDebtSheet onClose={() => setSheet(null)} onSave={addDebt} />}
      {sheet?.startsWith && sheet.startsWith('contrib:') && (() => {
        const goalId = sheet.split(':').slice(1).join(':');
        // Soportamos IDs string (newId) y los IDs numéricos de los seeds (1, 2…)
        const goal = state.goals.find(g => String(g.id) === goalId);
        return (
          <ContribSheet
            goal={goal}
            balance={state.balance}
            onClose={() => setSheet(null)}
            onSave={(amount) => { if (goal) addToGoal(goal.id, amount); setSheet(null); }}
          />
        );
      })()}

      {toast && <Toast {...toast} />}
      </div>
    </div>
  );
}

/* ============================================================
   EXPENSES PAGE
   ============================================================ */
const ExpensesPage = ({ ctx }) => {
  const { state, setPage, setSheet } = ctx;
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const filtered = useMemo(() => {
    return state.expenses.filter(e => {
      if (filter !== 'all' && e.category !== filter) return false;
      if (search && !e.name.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }, [state.expenses, filter, search]);

  // Datos para gráfica por categoría (mes actual)
  const monthExpenses = state.expenses.filter(e => isSameMonth(e.date));
  const byCategory = monthExpenses.reduce((acc, e) => {
    acc[e.category] = (acc[e.category] || 0) + e.amount; return acc;
  }, {});
  const totalMonth = Object.values(byCategory).reduce((s, v) => s + v, 0);

  return (
    <div className="px-5 pt-4 anim-in">
      <PageHeader title="Gastos" subtitle="Tu actividad mes a mes" onBack={() => setPage('home')} />

      <div className="bento-hero p-5 mb-4">
        <div className="text-[var(--text-2)] text-xs uppercase tracking-widest font-medium">Gasto este mes</div>
        <div className="font-display text-4xl mt-2 mb-4"><AnimatedNumber value={totalMonth} /></div>

        {/* Mini barras por categoría */}
        <div className="space-y-2.5">
          {Object.entries(byCategory).sort((a,b) => b[1] - a[1]).slice(0, 5).map(([cat, amt]) => {
            const c = CATEGORIES[cat] || CATEGORIES.other;
            const pct = (amt / totalMonth) * 100;
            return (
              <div key={cat}>
                <div className="flex items-center justify-between mb-1 text-xs">
                  <div className="flex items-center gap-2">
                    <span>{c.icon}</span>
                    <span className="text-[var(--text-1)]">{c.name}</span>
                  </div>
                  <span className="text-[var(--text-1)]">{formatMoney(amt)}</span>
                </div>
                <div className="h-1.5 bg-[var(--bg-3)] rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-700 shimmer" style={{ width: `${pct}%`, background: c.color, boxShadow: `0 0 6px ${c.color}` }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Search */}
      <div className="relative mb-3">
        <input
          type="text"
          placeholder="Buscar gasto…"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          className="pl-10"
        />
        <Icon name="search" size={18} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--text-2)]" />
      </div>

      {/* Filter chips */}
      <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 mb-3 -mx-5 px-5">
        <button onClick={() => setFilter('all')} className={`chip whitespace-nowrap ${filter === 'all' ? 'active' : ''}`}>Todos</button>
        {Object.entries(CATEGORIES).map(([k, c]) => (
          <button key={k} onClick={() => setFilter(k)} className={`chip whitespace-nowrap ${filter === k ? 'active' : ''}`}>
            {c.icon} {c.name}
          </button>
        ))}
      </div>

      {/* List */}
      <div className="space-y-2">
        {filtered.length === 0 ? (
          <div className="bento p-8 text-center">
            <div className="text-4xl mb-2">🍃</div>
            <div className="text-[var(--text-2)] text-sm">Sin gastos por aquí</div>
          </div>
        ) : filtered.map(e => {
          const cat = CATEGORIES[e.category] || CATEGORIES.other;
          const d = new Date(e.date);
          return (
            <div key={e.id} className="bento p-3 flex items-center gap-3">
              <div className="cat-icon" style={{ background: cat.color + '20', color: cat.color }}>{cat.icon}</div>
              <div className="flex-1 min-w-0">
                <div className="font-medium truncate">{e.name}</div>
                <div className="text-xs text-[var(--text-2)]">{cat.name} · {d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })}</div>
              </div>
              <div className="font-display text-lg">-{e.amount.toFixed(2)}€</div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

        </div>
      ) : (
        <div>
          <button onClick={() => setActive(null)} className="text-[var(--mint)] text-sm mb-4">← Volver</button>
          {active === 'savings' && <SavingsCalc />}
          {active === 'debt' && <DebtCalc />}
          {active === 'budget' && <BudgetCalc />}
          {active === 'compound' && <CompoundCalc />}
        </div>
      )}
    </div>
  );
};

const SavingsCalc = () => {
  const [monthly, setMonthly] = useState(150);
  const [months, setMonths] = useState(12);
  const total = monthly * months;
  return (
    <div className="bento p-5">
      <div className="font-display text-xl mb-4">Calculadora de ahorro</div>
      <label className="block text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-1.5">Ahorro mensual</label>

const DebtCalc = () => {
  const [debt, setDebt] = useState(2000);
  const [rate, setRate] = useState(5);
  const [months, setMonths] = useState(24);
  const r = rate / 100 / 12;
  const monthlyPay = r > 0 ? (debt * r) / (1 - Math.pow(1 + r, -months)) : debt / months;
  const totalPay = monthlyPay * months;
  const interest = totalPay - debt;
  return (
    <div className="bento p-5">
      <div className="font-display text-xl mb-4">Calculadora de deuda</div>
      <label className="block text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-1.5">Deuda total (€)</label>
      <input type="number" value={debt} onChange={e => setDebt(parseFloat(e.target.value) || 0)} className="mb-4" />
      <label className="block text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-1.5">Interés anual (%)</label>
      <input type="number" value={rate} onChange={e => setRate(parseFloat(e.target.value) || 0)} className="mb-4" />
      <label className="block text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-1.5">Plazo (meses)</label>
      <input type="number" value={months} onChange={e => setMonths(parseInt(e.target.value) || 0)} className="mb-6" />
      <div className="space-y-2.5">
        <div className="bg-[var(--bg-3)] rounded-xl p-4 flex items-center justify-between">
          <span className="text-sm text-[var(--text-1)]">Cuota mensual</span>
          <span className="font-display text-lg text-[var(--mint)]">{formatMoney(monthlyPay)}</span>
        </div>
        <div className="bg-[var(--bg-3)] rounded-xl p-4 flex items-center justify-between">
          <span className="text-sm text-[var(--text-1)]">Intereses totales</span>
          <span className="font-display text-lg text-[var(--danger)]">{formatMoney(interest)}</span>
        </div>
        <div className="bg-[var(--bg-3)] rounded-xl p-4 flex items-center justify-between">
          <span className="text-sm text-[var(--text-1)]">Total a pagar</span>
          <span className="font-display text-lg">{formatMoney(totalPay)}</span>
        </div>
      </div>
    </div>
  );
};
const BudgetCalc = () => {
  const [income, setIncome] = useState(2400);
  const necesidades = income * 0.5;
  const deseos = income * 0.3;
  const ahorro = income * 0.2;

        ].map((b, i) => (
          <div key={i} className="bg-[var(--bg-3)] rounded-xl p-4">
            <div className="flex items-center justify-between mb-1">
              <span className="text-sm font-medium" style={{ color: b.color }}>{b.label}</span>
              <span className="font-display text-lg">{formatMoney(b.val)}</span>

const CompoundCalc = () => {
  const [initial, setInitial] = useState(500);
  const [monthly, setMonthly] = useState(100);
  const [rate, setRate] = useState(7);
  const [years, setYears] = useState(10);
  // Clamps defensivos para evitar Infinity / NaN
  const safeInit = clamp(Number(initial) || 0, 0, 1e9);
  const safeMon  = clamp(Number(monthly) || 0, 0, 1e8);
  const safeRate = clamp(Number(rate) || 0, 0, 100);
  const safeYrs  = clamp(parseInt(years) || 0, 0, 100);
  const r = safeRate / 100 / 12;
  const n = safeYrs * 12;
  const futureInit = safeInit * Math.pow(1 + r, n);
  // Si la tasa es 0, la suma de aportaciones mensuales es simplemente monthly * n
  const futureMonthly = r === 0 ? safeMon * n : safeMon * ((Math.pow(1 + r, n) - 1) / r);
  const total = futureInit + futureMonthly;
  const invested = safeInit + safeMon * n;
  const gains = total - invested;
  return (
    <div className="bento p-5">
      <div className="font-display text-xl mb-4">Interés compuesto</div>
      <div className="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label className="block text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-1.5">Inicial</label>
          <input type="number" value={initial} onChange={e => setInitial(parseFloat(e.target.value) || 0)} />
        </div>
        <div>
          <label className="block text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-1.5">Mensual</label>
          <input type="number" value={monthly} onChange={e => setMonthly(parseFloat(e.target.value) || 0)} />
        </div>
        <div>
          <label className="block text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-1.5">Interés %</label>
          <input type="number" value={rate} onChange={e => setRate(parseFloat(e.target.value) || 0)} />
        </div>
        <div>
          <label className="block text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-1.5">Años</label>
          <input type="number" value={years} onChange={e => setYears(parseInt(e.target.value) || 0)} />
        </div>
      </div>
      <div className="bg-[var(--bg-3)] rounded-2xl p-5 text-center border border-[var(--border-strong)] mb-3">
        <div className="text-xs uppercase tracking-widest text-[var(--text-2)] mb-1">Valor final</div>
        <div className="font-display text-4xl text-[var(--mint)]">{formatMoney(total)}</div>
      </div>
      <div className="grid grid-cols-2 gap-2 text-xs">
        <div className="bg-[var(--bg-3)] rounded-xl p-3">
          <div className="text-[var(--text-2)]">Aportado</div>
          <div className="font-medium text-sm mt-0.5">{formatMoney(invested)}</div>
        </div>
        <div className="bg-[var(--bg-3)] rounded-xl p-3">
          <div className="text-[var(--text-2)]">Ganancias</div>
          <div className="font-medium text-sm mt-0.5 text-[var(--mint)]">+{formatMoney(gains)}</div>
        </div>
      </div>
    </div>
  );
};

const Sheet = ({ title, subtitle, onClose, children }) => {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose?.(); };
    document.addEventListener('keydown', onKey);
    // Bloquea el scroll del body bajo el sheet
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = prev; };
  }, [onClose]);
  return (
    <>
      <div className="sheet-backdrop" onClick={onClose} aria-hidden="true" />
      <div className="sheet" role="dialog" aria-modal="true" aria-label={title}>
        <div className="sheet-handle" />
        <div className="px-1 mb-5">
          <div className="font-display text-2xl">{title}</div>
          {subtitle && <div className="font-serif-accent text-[var(--mint)] text-sm">{subtitle}</div>}
        </div>
        {children}
      </div>
    </>
  );
};

  const t = parseAmount(target);
  const valid = t > 0 && name.trim().length > 0;
  const handleSave = () => { if (!valid) return; onSave({ name: name.trim(), target: t, icon }); };
  return (
    <Sheet title="Nuevo objetivo" subtitle="¿qué sueño cumplimos?" onClose={onClose}>
      <input type="text" aria-label="Nombre del objetivo" placeholder="Nombre · ej. Vacaciones" value={name} onChange={e => setName(e.target.value)} className="mb-3" autoFocus />
      <input type="text" inputMode="decimal" aria-label="Cantidad a alcanzar" placeholder="Cantidad a alcanzar (€)" value={target} onChange={e => setTarget(e.target.value)} className="mb-4" />
      <div className="text-xs text-[var(--text-2)] uppercase tracking-widest font-medium mb-2 px-1">Icono</div>
      <div className="grid grid-cols-5 gap-2 mb-6">
        {icons.map(i => (
          <button key={i} onClick={() => setIcon(i)} aria-label={'Icono ' + i} className={`press p-3 rounded-xl text-2xl ${icon === i ? 'bg-[rgba(var(--mint-rgb),0.15)] border border-[var(--mint)]' : 'bg-[var(--bg-3)] border border-[var(--border)]'}`}>
            {i}
          </button>
        ))}
      </div>
      <button onClick={handleSave} disabled={!valid} className="btn-mint w-full rounded-2xl py-4 font-medium disabled:opacity-40 disabled:pointer-events-none">Crear objetivo</button>
    </Sheet>
  );
};

const AddDebtSheet = ({ onClose, onSave }) => {
  const [person, setPerson] = useState('');
  const [amount, setAmount] = useState('');
  const [note, setNote] = useState('');
  const [direction, setDirection] = useState('owed_to_me');
  const a = parseAmount(amount);
  const valid = a > 0 && person.trim().length > 0;
  const handleSave = () => { if (!valid) return; onSave({ person: person.trim(), amount: a, note: note.trim(), direction }); };
  return (
    <Sheet title="Nueva deuda" subtitle="quién debe a quién" onClose={onClose}>
      <div className="grid grid-cols-2 gap-2 mb-4">
        <button onClick={() => setDirection('owed_to_me')} aria-label="Me deben" className={`press p-4 rounded-2xl border transition ${direction === 'owed_to_me' ? 'border-[var(--mint)] bg-[rgba(var(--mint-rgb),0.08)]' : 'border-[var(--border)] bg-[var(--bg-3)]'}`}>
          <div className="text-2xl mb-1">🤲</div>
          <div className="text-sm font-medium">Me deben</div>
        </button>
        <button onClick={() => setDirection('i_owe')} aria-label="Yo debo" className={`press p-4 rounded-2xl border transition ${direction === 'i_owe' ? 'border-[var(--danger)] bg-[rgba(255,107,138,0.08)]' : 'border-[var(--border)] bg-[var(--bg-3)]'}`}>
          <div className="text-2xl mb-1">💸</div>
          <div className="text-sm font-medium">Yo debo</div>
        </button>
      </div>
      <input type="text" aria-label="Nombre de la persona" placeholder="Nombre · ej. Carlos" value={person} onChange={e => setPerson(e.target.value)} className="mb-3" autoFocus />
      <input type="text" inputMode="decimal" aria-label="Cantidad" placeholder="Cantidad (€)" value={amount} onChange={e => setAmount(e.target.value)} className="mb-3" />
      <input type="text" aria-label="Concepto" placeholder="Concepto · ej. Cena pizza" value={note} onChange={e => setNote(e.target.value)} className="mb-6" />
      <button onClick={handleSave} disabled={!valid} className="btn-mint w-full rounded-2xl py-4 font-medium disabled:opacity-40 disabled:pointer-events-none">Guardar deuda</button>
    </Sheet>
  );
};

const ContribSheet = ({ goal, balance, onClose, onSave }) => {
  const [amount, setAmount] = useState('');
  if (!goal) return null;
  const remaining = Math.max(goal.target - goal.current, 0);
  const a = parseAmount(amount);
  const valid = a > 0 && remaining > 0;
  const exceedsBalance = a > balance;
  const exceedsRemaining = a > remaining;
  const handleSave = () => { if (!valid) return; onSave(Math.min(a, remaining)); };
  return (
    <Sheet title={`Aportar a ${goal.name}`} subtitle={`quedan ${formatMoney(remaining)}`} onClose={onClose}>
      <input
        type="text" inputMode="decimal" aria-label="Cantidad a aportar"
        placeholder="0,00 €"
        value={amount}
        onChange={e => setAmount(e.target.value)}
        autoFocus
        className="mb-2 text-center font-display !text-3xl !py-5"
      />
      {exceedsBalance && a > 0 && (
        <div className="text-xs text-[var(--warn)] text-center mb-2">Aviso · supera tu saldo disponible ({formatMoney(balance)})</div>
      )}
      {exceedsRemaining && !exceedsBalance && (
        <div className="text-xs text-[var(--text-2)] text-center mb-2">Solo se aportarán {formatMoney(remaining)} (los que faltan)</div>
      )}
      <div className="grid grid-cols-4 gap-2 mt-3 mb-6">
        {[10, 25, 50, 100].map(v => (
          <button key={v} onClick={() => setAmount(v.toString())} className="chip py-2">+{v}€</button>
        ))}
      </div>
      <button
        onClick={handleSave}
        disabled={!valid}
        className="btn-mint w-full rounded-2xl py-4 font-medium disabled:opacity-40 disabled:pointer-events-none"
      >
        Aportar al objetivo 🎉
      </button>
    </Sheet>
  );
};

/* ============================================================
   MOUNT
   ============================================================ */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
